name: build binaries

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact: dexuse-win32-x64
            binary: dexuse-win32-x64.exe
            source: target/release/dexuse.exe
          - name: macOS arm64
            os: macos-latest
            artifact: dexuse-darwin-arm64
            binary: dexuse-darwin-arm64
            source: target/release/dexuse
          - name: Linux x64
            os: ubuntu-latest
            artifact: dexuse-linux-x64
            binary: dexuse-linux-x64
            source: target/release/dexuse

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Verify CLI version
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ./target/release/dexuse.exe --version
          else
            ./target/release/dexuse --version
          fi

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.source }}" "dist/${{ matrix.binary }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag
          fi
